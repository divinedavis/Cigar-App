name: Maduro
options:
  bundleIdPrefix: com.divinedavis
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    DEVELOPMENT_TEAM: CG89RY4W6R
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.0.0
targets:
  Maduro:
    type: application
    platform: iOS
    sources:
      - path: Maduro
        excludes:
          - "Config.swift.example"
          - "Info.plist"
          - "Maduro.entitlements"
    resources:
      - path: Maduro/Assets.xcassets
    info:
      path: Maduro/Info.plist
      properties:
        CFBundleDisplayName: Maduro
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
        NSLocationWhenInUseUsageDescription: "Maduro uses your location to auto-tag the cigar lounge or shop you're at when you post."
        NSCameraUsageDescription: "Maduro needs the camera so you can capture photos and videos of your cigars."
        NSMicrophoneUsageDescription: "Maduro records audio alongside your videos."
        NSPhotoLibraryUsageDescription: "Maduro lets you pick photos and videos from your library to post."
        NSPhotoLibraryAddUsageDescription: "Maduro saves your captured moments to your photo library."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Maduro/Maduro.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.divinedavis.stogie
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: Supabase
        product: Supabase

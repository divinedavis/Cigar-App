name: Stogie
options:
  bundleIdPrefix: com.divinedavis
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    DEVELOPMENT_TEAM: CG89RY4W6R
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.0.0
targets:
  Stogie:
    type: application
    platform: iOS
    sources:
      - path: Stogie
        excludes:
          - "Config.swift.example"
          - "Info.plist"
          - "Stogie.entitlements"
    resources:
      - path: Stogie/Assets.xcassets
    info:
      path: Stogie/Info.plist
      properties:
        CFBundleDisplayName: Stogie
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
        NSLocationWhenInUseUsageDescription: "Stogie uses your location to auto-tag the cigar lounge or shop you're at when you post."
        NSCameraUsageDescription: "Stogie needs the camera so you can capture photos and videos of your cigars."
        NSMicrophoneUsageDescription: "Stogie records audio alongside your videos."
        NSPhotoLibraryUsageDescription: "Stogie lets you pick photos and videos from your library to post."
        NSPhotoLibraryAddUsageDescription: "Stogie saves your captured moments to your photo library."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Stogie/Stogie.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.divinedavis.stogie
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: Supabase
        product: Supabase
